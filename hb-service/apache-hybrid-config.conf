# Apache + Node.js Hybrid Configuration
# Apache serves static files, proxies API calls to Node.js

<VirtualHost *:80>
    ServerName your-domain.com
    DocumentRoot /path/to/hb-service/static
    
    <Directory /path/to/hb-service/static>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Proxy API requests to Node.js
    ProxyPass /api http://localhost:8000/api
    ProxyPassReverse /api http://localhost:8000/api
    
    ProxyPass /visualize http://localhost:8000/visualize
    ProxyPassReverse /visualize http://localhost:8000/visualize
    
    ProxyPass /health http://localhost:8000/health
    ProxyPassReverse /health http://localhost:8000/health
    
    # Serve static files directly from Apache
    # / -> /static/index.html (served by Apache)
    # /api/hb -> Node.js on port 8000
    
    ErrorLog ${APACHE_LOG_DIR}/hb-hybrid-error.log
    CustomLog ${APACHE_LOG_DIR}/hb-hybrid-access.log combined
</VirtualHost>
