# Apache Virtual Host Configuration for Hypoxic Burden Service
# Place this in /etc/apache2/sites-available/ (Linux) or httpd-vhosts.conf (macOS)

<VirtualHost *:80>
    ServerName your-domain.com
    ServerAlias www.your-domain.com
    
    # Proxy requests to Node.js running on port 8000
    ProxyPreserveHost On
    ProxyPass / http://localhost:8000/
    ProxyPassReverse / http://localhost:8000/
    
    # WebSocket support (if needed)
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://localhost:8000/$1" [P,L]
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/hb-service-error.log
    CustomLog ${APACHE_LOG_DIR}/hb-service-access.log combined
</VirtualHost>

# Enable required Apache modules:
# sudo a2enmod proxy
# sudo a2enmod proxy_http
# sudo a2enmod rewrite
# sudo systemctl restart apache2
