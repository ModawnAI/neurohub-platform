name: API CI

on:
  push:
    branches: [main]
    paths: ['apps/api/**']
  pull_request:
    branches: [main]
    paths: ['apps/api/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd apps/api
          ruff check .
          ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: neurohub_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/neurohub_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      ALLOW_DEV_AUTH_FALLBACK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
      - name: Run migrations
        run: |
          cd apps/api
          alembic upgrade head
      - name: Run tests
        run: |
          cd apps/api
          pytest -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: apps/api/test-results.xml

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"
          pip install pyright
      - name: Type check
        run: |
          cd apps/api
          pyright app/
        continue-on-error: true
