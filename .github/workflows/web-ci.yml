name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"
      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install
      - name: Type check
        run: bun run check
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
