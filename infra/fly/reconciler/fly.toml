app = "neurohub-reconciler"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "../../../apps/api/Dockerfile"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"

[processes]
  reconciler = "python -m app.reconciler"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
