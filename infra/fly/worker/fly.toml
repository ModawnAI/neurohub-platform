app = "neurohub-worker"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "../../../apps/api/Dockerfile"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"

[processes]
  worker = "celery -A app.worker.celery_app:celery_app worker -Q compute,reporting -l info --concurrency=4"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
